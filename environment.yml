name: hypocotyl
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch
  - torchvision
  - pytorch-cuda=12.1   # adjust to match your CUDA version (check with: nvidia-smi)
  - pip
  - pip:
      - plantcv
      - opencv-python
      - scikit-image
      - pandas
      - openpyxl
      - matplotlib
      - scipy
